<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mejker's Ai Lord Files</title>
<link rel="icon" type="image/png" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0a0a0a;
  --stone:   #1a1a1a;
  --iron:    #2a2a2a;
  --gold:    #a67c00;
  --gold-hi: #ffcc33;
  --fire:    #ff4500;
  --parchment: #d4c4a8;
  --dim:     #666;
  --frame-outer: var(--gold);
  --frame-inner: rgba(166, 124, 0, 0.3);
  --frame-glow:  rgba(166, 124, 0, 0.15);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  font-family: 'EB Garamond', Georgia, serif;
  color: var(--parchment);
  min-height: 100vh;
  overflow-x: hidden;
}

body.modal-open { overflow: hidden; }

/* SYSTEM RAMEK */
.framed { position: relative; }
.framed::before {
  content: ''; position: absolute; inset: 0; border: 4px solid var(--frame-outer);
  pointer-events: none; z-index: 2; transition: border-color 0.4s;
}
.framed::after {
  content: ''; position: absolute; inset: 6px; border: 1px solid var(--frame-inner);
  pointer-events: none; z-index: 2; transition: border-color 0.4s;
  box-shadow: 0 0 8px var(--frame-glow);
}
.framed-sm { position: relative; }
.framed-sm::before {
  content: ''; position: absolute; inset: 0; border: 2px solid var(--frame-outer);
  pointer-events: none; z-index: 2;
}
.framed-sm::after {
  content: ''; position: absolute; inset: 3px; border: 1px solid var(--frame-inner);
  pointer-events: none; z-index: 2;
}

#dust { position:fixed; inset:0; z-index:1; pointer-events:none; }
.page { position:relative; z-index:2; display:flex; flex-direction:column; min-height:100vh; }

/* HEADER */
.site-header { text-align: center; padding: 40px 20px; background: rgba(0,0,0,0.9); margin: 12px; }
.lang-switch { position: absolute; top: 16px; right: 16px; display: flex; gap: 8px; z-index: 10; }
.lang-btn {
  background: #000; color: var(--dim); padding: 8px 16px;
  cursor: pointer; font-family: 'Cinzel', serif; font-size: 0.7rem;
  border: none; transition: 0.3s;
}
.lang-btn.active { color: var(--gold-hi); }

.site-title { font-family: 'Cinzel', serif; font-size: 2.2rem; color: var(--gold); text-transform: uppercase; letter-spacing: 4px; }
.site-subtitle { font-style: italic; color: var(--dim); margin-top: 8px; }

/* ZAKŁADKI */
.cat-tabs { display: flex; justify-content: center; background: rgba(0,0,0,0.8); margin: 0 12px; }
.cat-btn {
  padding: 15px 30px; background: transparent; border: none; color: var(--dim);
  text-transform: uppercase; cursor: pointer; font-family: 'Cinzel', serif;
  font-size: 0.8rem; letter-spacing: 2px; position: relative; transition: 0.3s;
}
.cat-btn.active { color: var(--gold-hi); }
.cat-btn.active::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: var(--gold);
}

/* CONTENT */
.body-wrap { display: flex; flex: 1; padding: 12px; gap: 12px; }
.sidebar { width: 280px; flex-shrink: 0; background: rgba(5,5,5,0.95); padding: 20px 0; }
.sidebar-label { padding: 0 20px 10px; font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--gold); border-bottom: 1px solid var(--iron); margin-bottom: 15px; }

.lord-btn {
  width: 100%; display: flex; align-items: center; gap: 15px; padding: 12px 20px;
  background: transparent; border: none; border-left: 3px solid transparent;
  cursor: pointer; text-align: left; color: inherit; transition: 0.2s;
}
.lord-btn:hover { background: rgba(255,255,255,0.05); }
.lord-btn.on { background: rgba(166,124,0,0.15); border-left-color: var(--gold); }

.avatar-box { width: 50px; height: 50px; background: #000; display: grid; place-items: center; overflow: hidden; border: 1px solid var(--iron); }
.avatar-box img { width: 100%; height: 100%; object-fit: cover; }

.main { flex: 1; background: rgba(8,8,8,0.95); padding: 40px; min-height: 500px; }
.card-head { display: flex; gap: 30px; margin-bottom: 30px; border-bottom: 1px solid var(--iron); padding-bottom: 30px; }
.portrait-large { width: 160px; height: 190px; background: #000; display: grid; place-items: center; font-size: 4rem; overflow: hidden; }
.portrait-large img { width: 100%; height: 100%; object-fit: cover; }
.lord-title { font-family: 'Cinzel', serif; font-size: 2.5rem; color: var(--gold-hi); margin-bottom: 10px; }

.tag { background: #111; color: var(--gold); padding: 4px 12px; font-family: 'Cinzel', serif; font-size: 0.65rem; margin-right: 8px; }

.section-label { font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--gold); text-transform: uppercase; margin: 30px 0 15px; position: relative; }
.section-label::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 100px; height: 1px; background: var(--gold); }

.description { font-size: 1.15rem; line-height: 1.8; color: #ccc; margin-bottom: 30px; }

/* GALERIA */
.castle-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
.gallery-img-wrap { width: 100%; height: 200px; overflow: hidden; background: #000; cursor: zoom-in; }
.gallery-img { width: 100%; height: 100%; object-fit: cover; transition: 0.4s; }
.gallery-img:hover { transform: scale(1.05); }

.dl-section { margin-top: 40px; padding: 30px; background: rgba(0,0,0,0.5); }
.btn-dl { display: inline-block; background: var(--gold); color: #000; padding: 14px 30px; text-decoration: none; font-family: 'Cinzel', serif; font-weight: bold; transition: 0.3s; }
.btn-dl:hover { background: var(--gold-hi); transform: translateY(-2px); }
.install-path { margin-top: 20px; font-size: 0.85rem; color: var(--dim); font-family: monospace; background: #000; padding: 15px; border-left: 4px solid var(--fire); }

/* PUSTY STAN */
.empty-msg { text-align: center; padding-top: 100px; opacity: 0.6; }
.empty-msg h2 { font-family: 'Cinzel', serif; color: var(--gold); margin-bottom: 10px; }

/* MODAL */
#modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
  z-index: 9999; cursor: zoom-out; place-items: center; padding: 40px;
  backdrop-filter: blur(8px);
}
#modal-overlay.open { display: grid; }
#modal-img { max-width: 95%; max-height: 90vh; border: 2px solid var(--gold); object-fit: contain; }

@media (max-width: 900px) { .body-wrap { flex-direction: column; } .sidebar { width: 100%; } .card-head { flex-direction: column; align-items: center; text-align: center; } }
</style>
</head>
<body>

<canvas id="dust"></canvas>

<div id="modal-overlay" onclick="closeModal()">
  <img id="modal-img" src="" alt="Castle View">
</div>

<div class="page">
  <header class="site-header framed">
    <div class="lang-switch">
      <button class="lang-btn framed-sm" id="btn-pl" onclick="setLang('pl')">PL</button>
      <button class="lang-btn framed-sm" id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <div class="site-title">Mejker's Ai Lord Files</div>
    <div class="site-subtitle" id="site-subtitle">Twierdza: Własne Postacie AI</div>
  </header>

  <nav class="cat-tabs framed" id="cat-tabs-ui"></nav>

  <div class="body-wrap">
    <aside class="sidebar framed">
      <div class="sidebar-label" id="sidebar-lbl">Dostępni Lordowie</div>
      <div id="sidebar-list"></div>
    </aside>
    <main class="main framed" id="main-panel"></main>
  </div>
</div>

<script>
/* DANE */
const CATEGORIES = [
  { id:"all", pl:"Wszystkie",  en:"All",          theme:"#a67c00", hi:"#ffcc33" },
  { id:"t2",  pl:"Twierdza 2", en:"Stronghold 2", theme:"#d4af37", hi:"#f9e076" },
  { id:"Ot",  pl:"Inne", en:"Other", theme:"#708090", hi:"#ced4da" }
];

const LORDS = [
  {
    id: "olaf",
    category: "t2",
    name: "Olaf Grimtooth",
    icon: "🪓",
    avatar: "Avatarog.png",
    tags_pl: ["Agresywny","Wiking","2 Zamki"],
    tags_en: ["Aggressive","Viking","2 Castles"],
    desc_pl: "Olaf to AI o przeciętnym poziomie trudności, jednak nie należy go lekceważyć. Posiada dwa zamki, mocno inspirowane tymi, które budował w Twierdzy 2.",
    desc_en: "Olaf is an AI with an average level of difficulty, but he should not be underestimated. He has two castles, heavily inspired by those he built in Stronghold 2.",
    castle_imgs: ["olaf1.png","olaf2.png"],
    media_pl: "https://github.com/al4n-commits/Boty-Twierdza-2-w-krzy-owcu./raw/refs/heads/main/Olaf_audio+AI.rar",
    media_en: "https://github.com/al4n-commits/Boty-Twierdza-2-w-krzy-owcu./raw/refs/heads/main/Olaf_audio+AI_EN.rar"
  },
  {
    id: "edwin",
    category: "t2",
    name: "Edwin Blackfly",
    icon: "🕷",
    avatar: "avatarse.png",
    tags_pl: ["Słaby","Tchórz","3 Zamki"],
    tags_en: ["Weak","Coward","3 Castles"],
    desc_pl: "Edwin to dość niezdarny lord, jednak im dłużej pozostaje w grze, tym częściej wysyła swoje oddziały.",
    desc_en: "Edwin is a rather clumsy lord, but the longer he stays in the game, the more frequently he sends out his troops.",
    castle_imgs: ["edwin1.jpg","edwin2.jpg","edwin3.jpg"],
    media_pl: "https://github.com/al4n-commits/Boty-Twierdza-2-w-krzy-owcu./raw/refs/heads/main/Edwin_audio+AI.rar",
    media_en: "https://github.com/al4n-commits/Boty-Twierdza-2-w-krzy-owcu./raw/refs/heads/main/Edwin_audio+AI_EN.rar"
  }
];

const UI = {
  pl: { 
    subtitle: "Twierdza: Własne Postacie AI", 
    sidebar: "Dostępni Lordowie", 
    history: "Historia & Taktyka", 
    variants: "Warianty Zamków", 
    download: "Pobierz Plik", 
    btn_media: "POBIERZ Lorda", 
    no_file: "Plik niedostępny", 
    install: "Wypakuj do folderu:",
    empty_cat: "Ta kategoria jest obecnie pusta",
    empty_sub: "Lordowie wkrótce przybędą..."
  },
  en: { 
    subtitle: "Stronghold: Custom AI Lords", 
    sidebar: "Available Lords", 
    history: "History & Tactics", 
    variants: "Castle Variants", 
    download: "Download File", 
    btn_media: "DOWNLOAD Lord", 
    no_file: "File not available", 
    install: "Extract to folder:",
    empty_cat: "This category is currently empty",
    empty_sub: "Lords will arrive soon..."
  }
};

let lang = 'pl';
let currentCat = 'all';
let activeLordId = null;

function setLang(l) {
  lang = l;
  const newurl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?lang=' + l;
  window.history.pushState({path:newurl}, '', newurl);
  refreshUI();
}

function refreshUI() {
  document.getElementById('btn-pl').classList.toggle('active', lang === 'pl');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('site-subtitle').innerText = UI[lang].subtitle;
  document.getElementById('sidebar-lbl').innerText = UI[lang].sidebar;

  const tabs = document.getElementById('cat-tabs-ui');
  tabs.innerHTML = CATEGORIES.map(c => 
    `<button class="cat-btn ${currentCat===c.id?'active':''}" onclick="filterCat('${c.id}')">${lang==='pl'?c.pl:c.en}</button>`
  ).join('');

  const filtered = LORDS.filter(l => currentCat==='all' || l.category===currentCat);
  
  // LOGIKA ZAZNACZANIA PIERWSZEGO LORDA
  if (filtered.length > 0) {
    // Jeśli obecny aktywny lord nie jest w nowym filtrze, wybierz pierwszego z brzegu
    if (!filtered.find(l => l.id === activeLordId)) {
        activeLordId = filtered[0].id;
    }
  } else {
    activeLordId = null;
  }

  const list = document.getElementById('sidebar-list');
  list.innerHTML = filtered.map(l => `
    <button class="lord-btn ${activeLordId===l.id?'on':''}" onclick="showLord('${l.id}')">
      <div class="avatar-box">${l.avatar ? `<img src="${l.avatar}" onerror="this.src=''">` : l.icon}</div>
      <span>${l.name}</span>
    </button>`).join('');

  if (activeLordId) {
    showLord(activeLordId);
  } else {
    renderEmpty();
  }
}

function filterCat(id) {
  currentCat = id;
  const c = CATEGORIES.find(x => x.id === id);
  document.documentElement.style.setProperty('--gold', c.theme);
  document.documentElement.style.setProperty('--gold-hi', c.hi);
  refreshUI();
}

function renderEmpty() {
    const t = UI[lang];
    document.getElementById('main-panel').innerHTML = `
        <div class="empty-msg">
            <h2>${t.empty_cat}</h2>
            <p>${t.empty_sub}</p>
        </div>
    `;
}

function showLord(id) {
  activeLordId = id;
  const l = LORDS.find(x => x.id === id);
  const t = UI[lang];
  const link = lang === 'pl' ? l.media_pl : l.media_en;

  document.querySelectorAll('.lord-btn').forEach(b => b.classList.remove('on'));
  // Dodanie klasy "on" do przycisku w sidebarze
  const btns = document.querySelectorAll('.lord-btn');
  btns.forEach(b => {
    if(b.getAttribute('onclick').includes(id)) b.classList.add('on');
  });

  const gallery = l.castle_imgs.map(img => `
    <div class="gallery-img-wrap framed-sm" onclick="openModal('${img}')">
      <img src="${img}" class="gallery-img">
    </div>`).join('');

  document.getElementById('main-panel').innerHTML = `
    <div class="card-head">
      <div class="portrait-large framed">${l.avatar ? `<img src="${l.avatar}">` : l.icon}</div>
      <div>
        <div class="lord-title">${l.name}</div>
        <div>${(lang==='pl'?l.tags_pl:l.tags_en).map(tag=>`<span class="tag framed-sm">${tag}</span>`).join('')}</div>
      </div>
    </div>
    <div class="section-label">${t.history}</div>
    <p class="description">${lang==='pl'?l.desc_pl:l.desc_en}</p>
    <div class="section-label">${t.variants}</div>
    <div class="castle-gallery">${gallery}</div>
    <div class="dl-section framed">
      <div class="section-label">${t.download}</div>
      <a href="${link}" class="btn-dl framed-sm">${t.btn_media}</a>
      <div class="install-path"><strong>${t.install}</strong><br><code>AppData\\LocalLow\\Firefly Studios\\Stronghold Crusader Definitive Edition</code></div>
    </div>`;
}

function openModal(src) {
  const m = document.getElementById('modal-overlay');
  document.getElementById('modal-img').src = src;
  m.classList.add('open');
  document.body.classList.add('modal-open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.classList.remove('modal-open');
}

window.onload = () => {
  const p = new URLSearchParams(window.location.search).get('lang');
  if (p) lang = p;
  refreshUI();
};

/* ASH EFFECT */
(function(){
  const c = document.getElementById('dust'); const ctx = c.getContext('2d');
  let w, h, p = [];
  function res() { w = c.width = window.innerWidth; h = c.height = window.innerHeight; }
  class Particle {
    constructor() { this.reset(true); }
    reset(i) { this.x = Math.random()*w; this.y = i?Math.random()*h:h+10; this.s = Math.random()*2; this.v = -(Math.random()*1+0.5); this.a = Math.random()*0.5; }
    up() { this.y += this.v; this.a -= 0.001; if(this.a<=0 || this.y<-10) this.reset(false); }
    dr() { ctx.globalAlpha = this.a; ctx.fillStyle = '#ff4500'; ctx.fillRect(this.x, this.y, this.s, this.s); }
  }
  for(let i=0;i<70;i++) p.push(new Particle());
  function loop() { ctx.clearRect(0,0,w,h); p.forEach(x=>{x.up();x.dr();}); requestAnimationFrame(loop); }
  window.onresize = res; res(); loop();
})();
</script>
</body>
</html>
