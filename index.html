<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mejker's Ai Lord Files</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230a0a0a'/><path d='M16 3 L27 8 L27 18 C27 24 16 29 16 29 C16 29 5 24 5 18 L5 8 Z' fill='%23a67c00' stroke='%23ffcc33' stroke-width='1'/><line x1='16' y1='7' x2='16' y2='25' stroke='%23000' stroke-width='2.5'/><line x1='11' y1='14' x2='21' y2='14' stroke='%23000' stroke-width='2'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0a0a0a;
  --stone:   #1a1a1a;
  --iron:    #2a2a2a;
  --gold:    #a67c00;
  --gold-hi: #ffcc33;
  --fire:    #ff4500;
  --parchment: #d4c4a8;
  --dim:     #666;

  /* Ramka - warstwy */
  --frame-outer: var(--gold);
  --frame-mid:   #111;
  --frame-inner: color-mix(in srgb, var(--gold) 35%, transparent);
  --frame-glow:  color-mix(in srgb, var(--gold) 12%, transparent);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  font-family: 'EB Garamond', Georgia, serif;
  color: var(--parchment);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ══════════════════════════════════════
   SYSTEM RAMEK
══════════════════════════════════════ */

/* Ramka bazowa - replikuje PNG: gruba zewnętrzna + cienka wewnętrzna + przerwa */
.framed {
  position: relative;
}
.framed::before {
  content: '';
  position: absolute;
  inset: 0;
  border: 4px solid var(--frame-outer);
  pointer-events: none;
  z-index: 2;
  transition: border-color 0.4s;
}
.framed::after {
  content: '';
  position: absolute;
  inset: 6px;
  border: 1px solid var(--frame-inner);
  pointer-events: none;
  z-index: 2;
  transition: border-color 0.4s, box-shadow 0.4s;
  box-shadow: 0 0 8px var(--frame-glow);
}

/* Wariant cienki (sidebar, tagi, przyciski) */
.framed-sm::before {
  content: '';
  position: absolute;
  inset: 0;
  border: 2px solid var(--frame-outer);
  pointer-events: none;
  z-index: 2;
  transition: border-color 0.4s;
}
.framed-sm::after {
  content: '';
  position: absolute;
  inset: 3px;
  border: 1px solid var(--frame-inner);
  pointer-events: none;
  z-index: 2;
  transition: border-color 0.4s;
}

/* Ramka aktywna/hover - jaśniejszy kolor */
.framed:hover::before, .framed-sm:hover::before {
  border-color: var(--gold-hi);
}

/* ══════════════════════════════════════
   CANVAS - POPIOŁY
══════════════════════════════════════ */
#dust { position:fixed; inset:0; z-index:999; pointer-events:none; }

/* ══════════════════════════════════════
   LAYOUT
══════════════════════════════════════ */
.page { position:relative; z-index:2; display:flex; flex-direction:column; min-height:100vh; }

/* ══════════════════════════════════════
   HEADER
══════════════════════════════════════ */
.site-header {
  text-align: center;
  padding: 36px 20px 28px;
  background: rgba(0,0,0,0.9);
  position: relative;
  margin: 12px;
}

.lang-switch {
  position: absolute;
  top: 16px;
  right: 16px;
  display: flex;
  gap: 6px;
}
.lang-btn {
  position: relative;
  background: #000;
  color: var(--dim);
  padding: 7px 14px;
  cursor: pointer;
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  letter-spacing: 1px;
  border: none;
  transition: color 0.3s;
}
.lang-btn.active { color: var(--gold-hi); }



.site-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.3rem, 3.5vw, 2.2rem);
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 4px;
  transition: color 0.4s;
}
.site-subtitle {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  color: var(--dim);
  font-size: 0.95rem;
  margin-top: 6px;
  letter-spacing: 1px;
  transition: color 0.4s;
}

/* ══════════════════════════════════════
   ZAKŁADKI
══════════════════════════════════════ */
.cat-tabs {
  display: flex;
  justify-content: center;
  gap: 2px;
  padding: 0 12px;
  background: rgba(0,0,0,0.7);
  border-bottom: none;
  margin: 0 12px;
}
.cat-btn {
  padding: 12px 28px;
  background: transparent;
  border: none;
  color: var(--dim);
  text-transform: uppercase;
  cursor: pointer;
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  letter-spacing: 2px;
  position: relative;
  transition: color 0.3s;
}
.cat-btn::after {
  content: '';
  position: absolute;
  bottom: 0; left: 50%; right: 50%;
  height: 2px;
  background: var(--gold);
  transition: left 0.3s, right 0.3s, background 0.4s;
}
.cat-btn.active { color: var(--gold-hi); }
.cat-btn.active::after { left: 0; right: 0; }

/* ══════════════════════════════════════
   BODY
══════════════════════════════════════ */
.body-wrap {
  display: flex;
  flex: 1;
  padding: 12px;
  gap: 12px;
}

/* ══════════════════════════════════════
   SIDEBAR
══════════════════════════════════════ */
.sidebar {
  width: 260px;
  flex-shrink: 0;
  background: rgba(5,5,5,0.95);
  padding: 16px 0;
  position: relative;
}

.sidebar-label {
  padding: 0 14px 10px;
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 3px;
  border-bottom: 1px solid var(--iron);
  margin-bottom: 10px;
  transition: color 0.4s;
}

.lord-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: transparent;
  border: none;
  border-left: 3px solid transparent;
  cursor: pointer;
  text-align: left;
  color: inherit;
  transition: background 0.2s, border-color 0.3s;
  font-family: 'EB Garamond', serif;
}
.lord-btn:hover { background: rgba(255,255,255,0.04); }
.lord-btn.on {
  background: rgba(166,124,0,0.12);
  border-left-color: var(--gold);
}

/* Avatary */
.avatar-box {
  width: 44px; height: 44px;
  background: #000;
  display: grid;
  place-items: center;
  overflow: hidden;
  font-size: 1.4rem;
  flex-shrink: 0;
  position: relative;
}
.avatar-box.has-img { border: 1px solid var(--iron); }
.avatar-box img { width: 100%; height: 100%; object-fit: cover; }

.lord-name { font-size: 0.95rem; color: var(--parchment); }

/* ══════════════════════════════════════
   MAIN
══════════════════════════════════════ */
.main {
  flex: 1;
  background: rgba(8,8,8,0.95);
  padding: 32px;
  position: relative;
  min-height: 400px;
}

/* Karta lorda - góra */
.card-head {
  display: flex;
  gap: 28px;
  margin-bottom: 28px;
  padding-bottom: 20px;
  align-items: flex-start;
}

.portrait-large {
  width: 140px;
  height: 168px;
  background: #000;
  display: grid;
  place-items: center;
  font-size: 3.5rem;
  overflow: hidden;
  flex-shrink: 0;
  position: relative;
}
.portrait-large img { width: 100%; height: 100%; object-fit: cover; }

.title-area { flex: 1; }
.lord-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.4rem, 3vw, 2rem);
  color: var(--gold-hi);
  margin-bottom: 10px;
  letter-spacing: 1px;
  transition: color 0.4s;
}
.tags-row { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 12px; }
.tag {
  background: #111;
  color: var(--gold);
  padding: 3px 12px;
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  position: relative;
  transition: color 0.4s;
}

/* Sekcja */
.section-label {
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  letter-spacing: 3px;
  color: var(--gold);
  text-transform: uppercase;
  padding-bottom: 6px;
  margin-bottom: 14px;
  margin-top: 24px;
  position: relative;
  transition: color 0.4s;
}
.section-label::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, var(--gold), transparent);
  transition: background 0.4s;
}

/* Opis */
.description {
  font-size: 1.1rem;
  line-height: 1.7;
  font-style: italic;
  color: #bbb;
  margin-bottom: 20px;
}

/* Galeria */
.castle-gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
}
.gallery-img {
  width: 100%;
  height: 190px;
  object-fit: cover;
  cursor: zoom-in;
  display: block;
  position: relative;
  transition: transform 0.2s;
}
.gallery-img-wrap {
  position: relative;
  overflow: hidden;
}
.gallery-img:hover { transform: scale(1.03); }

/* Download */
.dl-section {
  margin-top: 32px;
  padding: 24px;
  background: rgba(0,0,0,0.6);
  position: relative;
}
.btn-dl {
  display: inline-block;
  background: var(--gold);
  color: #000;
  padding: 11px 26px;
  text-decoration: none;
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 18px;
  transition: background 0.3s;
  position: relative;
}
.btn-dl:hover { background: var(--gold-hi); }

.install-path {
  font-size: 0.82rem;
  color: var(--dim);
  font-family: 'Courier New', monospace;
  background: #000;
  padding: 12px 16px;
  border-left: 3px solid var(--fire);
  line-height: 1.6;
}
.install-path code { color: var(--parchment); }

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  min-height: 300px;
  gap: 16px;
  opacity: 0.4;
}
.empty-crest { font-size: 4rem; }
.empty-text {
  font-family: 'Cinzel', serif;
  font-size: 1rem;
  letter-spacing: 3px;
  color: var(--gold);
  text-transform: uppercase;
}

/* ══════════════════════════════════════
   LIGHTBOX
══════════════════════════════════════ */
#modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.93);
  z-index: 1000;
  cursor: zoom-out;
  place-items: center;
  padding: 20px;
}
#modal-overlay.open { display: grid; }
#modal-img {
  max-width: 90%;
  max-height: 90%;
  position: relative;
}

/* ══════════════════════════════════════
   RESPONSYWNOŚĆ
══════════════════════════════════════ */
@media (max-width: 800px) {
  .body-wrap { flex-direction: column; padding: 8px; }
  .sidebar { width: 100%; }
  .color-picker-wrap { display: none; }
  .main { padding: 20px; }
}
</style>
</head>
<body>

<canvas id="dust"></canvas>

<div id="modal-overlay" onclick="closeModal()">
  <div class="framed" style="display:inline-block">
    <img id="modal-img" src="" alt="">
  </div>
</div>

<div class="page">

  <!-- HEADER -->
  <header class="site-header framed">

    <div class="lang-switch">
      <button class="lang-btn framed-sm" id="btn-pl" onclick="setLang('pl')">PL</button>
      <button class="lang-btn framed-sm" id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <div class="site-title">Mejker's Ai Lord Files</div>
    <div class="site-subtitle">Stronghold Custom AI Lords</div>
  </header>

  <!-- ZAKŁADKI -->
  <nav class="cat-tabs framed" id="cat-tabs-ui"></nav>

  <div class="body-wrap">

    <!-- SIDEBAR -->
    <aside class="sidebar framed">
      <div class="sidebar-label" id="sidebar-lbl"></div>
      <div id="sidebar-list"></div>
    </aside>

    <!-- MAIN -->
    <main class="main framed" id="main-panel"></main>

  </div>
</div>

<script>
/* ══════════════════════════════════
   DANE
══════════════════════════════════ */
const CATEGORIES = [
  { id:"all", pl:"Wszystkie",  en:"All",         theme:"#a67c00", hi:"#ffcc33" },
  { id:"t2",  pl:"Twierdza 2", en:"Stronghold 2", theme:"#d4af37", hi:"#f9e076" },
  { id:"t1",  pl:"Twierdza 1", en:"Stronghold 1", theme:"#7c0000", hi:"#ff4444" }
];

const LORDS = [
  {
    id: "olaf",
    category: "t2",
    name: "Olaf Grimtooth",
    icon: "🪓",
    avatar: "Avatarog.png",
    tags_pl: ["Agresywny","Wiking","2 Zamki"],
    tags_en: ["Aggressive","Viking","2 Castles"],
    desc_pl: "Olaf to AI o przeciętnym poziomie trudności, jednak nie należy go lekceważyć. Posiada dwa zamki, mocno inspirowane tymi, które budował w Twierdzy 2.",
    desc_en: "Olaf is an AI with an average level of difficulty, but he should not be underestimated. He has two castles, heavily inspired by those he built in Stronghold 2.",
    castle_imgs: ["olaf1.png","olaf2.png"],
    media_pl: "https://github.com/al4n-commits/Boty-Twierdza-2-w-krzy-owcu./raw/refs/heads/main/Olaf%20Grimtooth.rar",
    media_en: "#"
  },
  {
    id: "edwin",
    category: "t2",
    name: "Edwin Blackfly",
    icon: "🕷",
    avatar: "avatarse.png",
    tags_pl: ["Słaby","Tchórz","3 Zamki"],
    tags_en: ["Weak","Coward","3 Castles"],
    desc_pl: "Edwin to dość niezdarny lord, jednak im dłużej pozostaje w grze, tym częściej wysyła swoje oddziały.",
    desc_en: "Edwin is a rather clumsy lord, but the longer he stays in the game, the more frequently he sends out his troops.",
    castle_imgs: ["edwin1.jpg","edwin2.jpg","edwin3.jpg"],
    media_pl: "https://github.com/al4n-commits/Boty-Twierdza-2-w-krzy-owcu./raw/refs/heads/main/Sir%20Edwin.rar",
    media_en: "#"
  }
];

const UI = {
  pl: {
    sidebar: "Dostępni Lordowie",
    empty: "Wybierz lorda z listy",
    no_lords: "Aktualnie nie ma tu lordów",
    history: "Historia & Taktyka",
    variants: "Warianty Zamków",
    download: "Pobierz Plik",
    btn_media: "POBIERZ PACZKĘ PL",
    no_file: "Plik niedostępny",
    install: "Wypakuj do folderu:"
  },
  en: {
    sidebar: "Available Lords",
    empty: "Select a lord",
    no_lords: "No lords available here",
    history: "History & Tactics",
    variants: "Castle Variants",
    download: "Download File",
    btn_media: "DOWNLOAD ENG PACK",
    no_file: "File not available",
    install: "Extract to folder:"
  }
};

/* ══════════════════════════════════
   STAN
══════════════════════════════════ */
let lang = 'pl';
let currentCat = 'all';
let activeLordId = null;

/* ══════════════════════════════════
   JĘZYK / KATEGORIA
══════════════════════════════════ */
function setLang(l) { lang = l; refreshUI(); }

function applyTheme(base, hi) {
  const root = document.documentElement;
  root.style.setProperty('--gold', base);
  root.style.setProperty('--gold-hi', hi);
  root.style.setProperty('--frame-outer', base);
  root.style.setProperty('--frame-inner', hexAlpha(base, 0.35));
  root.style.setProperty('--frame-glow',  hexAlpha(base, 0.12));
}

function hexAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function filterCat(catId) {
  currentCat = catId;
  const cat = CATEGORIES.find(c => c.id === catId);
  if (cat) applyTheme(cat.theme, cat.hi);
  refreshUI();
}

/* ══════════════════════════════════
   RENDER
══════════════════════════════════ */
function refreshUI() {
  document.getElementById('btn-pl').classList.toggle('active', lang==='pl');
  document.getElementById('btn-en').classList.toggle('active', lang==='en');

  const tabs = document.getElementById('cat-tabs-ui');
  tabs.innerHTML = CATEGORIES.map(c =>
    `<button class="cat-btn ${currentCat===c.id?'active':''}" onclick="filterCat('${c.id}')">${lang==='pl'?c.pl:c.en}</button>`
  ).join('');

  document.getElementById('sidebar-lbl').innerText = UI[lang].sidebar;

  const filtered = LORDS.filter(l => currentCat==='all' || l.category===currentCat);

  // Jeśli aktywny lord nie jest w tej kategorii, zresetuj
  if (activeLordId && !filtered.find(l => l.id === activeLordId)) {
    activeLordId = null;
  }

  // Auto-wybierz pierwszego lorda jeśli żaden nie jest aktywny
  if (!activeLordId && filtered.length > 0) {
    activeLordId = filtered[0].id;
    // Zastosuj kolor kategorii tego lorda
    const lordCat = CATEGORIES.find(c => c.id === filtered[0].category);
    if (lordCat) applyTheme(lordCat.theme, lordCat.hi);
  }

  renderSidebar();
  if (filtered.length === 0) {
    renderNoLords();
  } else {
    showLord(activeLordId);
  }
}

function renderEmpty() {
  document.getElementById('main-panel').innerHTML = `
    <div class="empty-state">
      <div class="empty-crest">⚔</div>
      <div class="empty-text">${UI[lang].empty}</div>
    </div>`;
}

function renderNoLords() {
  document.getElementById('main-panel').innerHTML = `
    <div class="empty-state">
      <div class="empty-crest">🏰</div>
      <div class="empty-text">${UI[lang].no_lords}</div>
    </div>`;
}

function renderSidebar() {
  const list = document.getElementById('sidebar-list');
  const filtered = LORDS.filter(l => currentCat==='all' || l.category===currentCat);
  list.innerHTML = filtered.map(l => {
    const hasImg = l.avatar && l.avatar !== "";
    return `<button class="lord-btn ${activeLordId===l.id?'on':''}" onclick="showLord('${l.id}')">
      <div class="avatar-box ${hasImg?'has-img':''}">${hasImg ? `<img src="${l.avatar}" onerror="this.parentNode.innerHTML='${l.icon}'">` : l.icon}</div>
      <span class="lord-name">${l.name}</span>
    </button>`;
  }).join('');
}

function showLord(id) {
  activeLordId = id;
  const l = LORDS.find(x => x.id===id);
  const t = UI[lang];
  const link = lang==='pl' ? l.media_pl : l.media_en;
  const hasPortrait = l.avatar && l.avatar !== "";

  // Zastosuj kolor kategorii tego lorda (nawet jeśli jesteś w "Wszystkie")
  const lordCat = CATEGORIES.find(c => c.id === l.category);
  if (lordCat) applyTheme(lordCat.theme, lordCat.hi);

  renderSidebar();

  const gallery = l.castle_imgs.map(img => `
    <div class="gallery-img-wrap framed-sm">
      <img src="${img}" class="gallery-img" onclick="openModal('${img}')" onerror="this.style.display='none'">
    </div>`).join('');

  const dlBtn = (link && link !== '#')
    ? `<a href="${link}" class="btn-dl framed-sm">${t.btn_media}</a>`
    : `<span style="color:var(--fire);font-family:'Cinzel',serif;font-size:0.8rem">${t.no_file}</span>`;

  document.getElementById('main-panel').innerHTML = `
    <div class="card-head">
      <div class="portrait-large framed">${hasPortrait ? `<img src="${l.avatar}" onerror="this.parentNode.innerHTML='${l.icon}'">` : l.icon}</div>
      <div class="title-area">
        <div class="lord-title">${l.name}</div>
        <div class="tags-row">${(lang==='pl'?l.tags_pl:l.tags_en).map(tag=>`<span class="tag framed-sm">${tag}</span>`).join('')}</div>
      </div>
    </div>

    <div class="section-label">${t.history}</div>
    <p class="description">${lang==='pl'?l.desc_pl:l.desc_en}</p>

    <div class="section-label">${t.variants} (${l.castle_imgs.length})</div>
    <div class="castle-gallery">${gallery}</div>

    <div class="dl-section framed">
      <div class="section-label">${t.download}</div>
      ${dlBtn}
      <div class="install-path">
        <strong style="color:var(--gold)">${t.install}</strong><br>
        <code>AppData\\LocalLow\\Firefly Studios\\Stronghold Crusader Definitive Edition\\CustomMedia</code>
      </div>
    </div>`;
}

/* ══════════════════════════════════
   LIGHTBOX
══════════════════════════════════ */
function openModal(src) {
  document.getElementById('modal-img').src = src;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

/* ══════════════════════════════════
   INICJALIZACJA
══════════════════════════════════ */
refreshUI();

/* ══════════════════════════════════
   POPIOŁY / OGIEŃ
══════════════════════════════════ */
(function(){
  const canvas = document.getElementById('dust');
  const ctx = canvas.getContext('2d');
  let w, h, particles = [];

  function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }

  class Ash {
    constructor() { this.reset(true); }
    reset(init) {
      this.x = Math.random() * w;
      this.y = init ? Math.random() * h : h + 20;
      this.size = Math.random() * 2.5 + 0.5;
      this.vy = -(Math.random() * 1.5 + 0.5);
      this.vx = (Math.random() - 0.5) * 1.2;
      this.alpha = Math.random() * 0.5 + 0.15;
      this.color = Math.random() > 0.5 ? '#ff4500' : '#ff8c00';
    }
    update() {
      this.y += this.vy;
      this.x += this.vx;
      this.alpha -= 0.0015;
      if (this.alpha <= 0 || this.y < -20) this.reset(false);
    }
    draw() {
      ctx.globalAlpha = this.alpha;
      ctx.fillStyle = this.color;
      ctx.fillRect(this.x, this.y, this.size, this.size);
    }
  }

  for (let i = 0; i < 100; i++) particles.push(new Ash());

  function loop() {
    ctx.clearRect(0, 0, w, h);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', resize);
  resize();
  loop();
})();
</script>
</body>
</html>
