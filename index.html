<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mejker's Ai lord Files</title>
<style>
:root {
  --bg-dark: #0a0a0a; --stone: #1a1a1a; --iron: #333; --gold: #a67c00; --gold-hi: #ffcc33;
  --fire: #ff4500; --parchment: #d4c4a8; --text-dim: #888;
}
* { margin:0; padding:0; box-sizing:border-box; border-radius: 0 !important; }

body { 
  background: var(--bg-dark); 
  /* Ustawienie ARIAL jako głównej czcionki */
  font-family: Arial, Helvetica, sans-serif; 
  color: var(--parchment); 
  min-height: 100vh; 
  overflow-x: hidden; 
  font-size: 16px;
}

.bg-fix { position:fixed; inset:0; z-index:0; background: linear-gradient(180deg, #050505 0%, #1a1108 100%); }
#dust { position:fixed; inset:0; z-index:1; pointer-events:none; }
.page { position:relative; z-index:2; display:flex; flex-direction:column; min-height:100vh; }

/* Header */
.site-header { text-align:center; padding:40px 20px; border-bottom: 4px solid var(--iron); background: rgba(0,0,0,0.85); position: relative; }
.lang-switch { position: absolute; top: 15px; right: 20px; display: flex; gap: 5px; }
.lang-btn { background: #000; border: 1px solid var(--iron); color: var(--text-dim); padding: 8px 12px; cursor: pointer; font-weight: bold; font-family: Arial, sans-serif; }
.lang-btn.active { border-color: var(--gold); color: var(--gold-hi); background: var(--stone); }

h1 { font-size: clamp(1.5rem, 4vw, 2.5rem); color: var(--gold); text-transform: uppercase; letter-spacing: 2px; font-family: Arial, sans-serif; }

/* Zakładki */
.cat-tabs { display: flex; justify-content: center; background: var(--stone); border-bottom: 2px solid var(--gold); }
.cat-btn { padding: 15px 25px; background: transparent; border: none; color: var(--text-dim); text-transform: uppercase; cursor: pointer; font-weight: bold; font-family: Arial, sans-serif; font-size: 0.85rem; }
.cat-btn.active { color: #000; background: var(--gold); }

.body-wrap { display:flex; flex:1; }

/* Sidebar */
.sidebar { width: 280px; background: rgba(10,10,10,0.95); border-right: 2px solid var(--iron); padding: 20px 0; }
.sidebar-label { padding: 0 15px 10px; font-size: 0.75rem; color: var(--gold); border-bottom: 1px solid var(--iron); margin-bottom: 10px; text-transform: uppercase; font-family: Arial, sans-serif; }
.lord-btn { width: 100%; display: flex; align-items: center; gap: 12px; padding: 12px 15px; background: transparent; border: none; border-left: 4px solid transparent; cursor: pointer; text-align: left; color: inherit; font-family: Arial, sans-serif; }
.lord-btn:hover { background: rgba(255,255,255,0.05); }
.lord-btn.on { background: rgba(166, 124, 0, 0.2); border-left-color: var(--gold); }

/* Avatars */
.avatar-box { width: 50px; height: 50px; background: #000; display: grid; place-items: center; overflow: hidden; }
.avatar-box.has-img { border: 1px solid var(--iron); }
.avatar-box img { width: 100%; height: 100%; object-fit: cover; }

.main { flex:1; padding: 40px; }
.card-head { display: flex; gap: 30px; margin-bottom: 30px; border-bottom: 2px solid var(--iron); padding-bottom: 20px; align-items: center; }
.portrait-large { width: 150px; height: 180px; background: #000; display: grid; place-items: center; font-size: 4rem; overflow: hidden; }
.portrait-large.has-img { border: 3px solid var(--gold); }
.portrait-large img { width: 100%; height: 100%; object-fit: cover; }

.title-area h2 { font-size: 2.2rem; color: var(--gold-hi); margin-bottom: 5px; font-family: Arial, sans-serif; }
.tags-row { display: flex; flex-wrap: wrap; gap: 8px; }
.tag { background: #222; border: 1px solid var(--gold); color: var(--gold); padding: 2px 10px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; font-family: Arial, sans-serif; }

.description { font-size: 1.1rem; line-height: 1.6; font-style: italic; color: #ccc; margin-bottom: 30px; }
.section-label { color: var(--gold); border-bottom: 1px solid var(--iron); margin-bottom: 15px; padding-bottom: 5px; text-transform: uppercase; margin-top: 20px; font-weight: bold; font-size: 0.85rem; font-family: Arial, sans-serif; }

/* Galeria */
.castle-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
.gallery-img { width: 100%; height: 200px; border: 2px solid var(--iron); object-fit: cover; transition: 0.2s; }
.gallery-img:hover { border-color: var(--gold-hi); }

/* Download */
.dl-section { margin-top: 40px; padding: 25px; background: rgba(0,0,0,0.5); border: 2px solid var(--iron); }
.btn-dl { display: inline-block; background: var(--gold); color: #000; padding: 12px 25px; text-decoration: none; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; font-family: Arial, sans-serif; }
.install-path { font-size: 0.9rem; color: var(--text-dim); font-family: 'Courier New', monospace; background: #000; padding: 15px; border-left: 4px solid var(--fire); }

.empty-state { text-align: center; margin-top: 100px; opacity: 0.5; font-size: 1.5rem; font-family: Arial, sans-serif; }

@media (max-width: 800px) { .body-wrap { flex-direction: column; } .sidebar { width: 100%; } }
</style>
</head>
<body>

<div class="bg-fix"></div>
<canvas id="dust"></canvas>

<div class="page">
  <header class="site-header">
    <div class="lang-switch">
        <button class="lang-btn" id="btn-pl" onclick="setLang('pl')">PL</button>
        <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <h1>Mejker's Ai lord Files</h1>
  </header>
  <nav class="cat-tabs" id="cat-tabs-ui"></nav>
  <div class="body-wrap">
    <aside class="sidebar">
      <div class="sidebar-label" id="sidebar-lbl"></div>
      <div id="sidebar-list"></div>
    </aside>
    <main class="main" id="main-panel"></main>
  </div>
</div>

<script>
/* --- DANE --- */
const CATEGORIES = [
    { id: "all",  pl: "Wszystkie", en: "All" },
    { id: "t2",   pl: "Twierdza 2", en: "Stronghold 2" }
];

const LORDS = [
  {
    id: "Olaf Grimtooth",
    category: "t2",
    name: "Olaf Grimtooth",
    icon: "🪓",
    avatar: "Avatarog.png", 
    tags_pl: ["Agresywny", "Wiking", "2 Zamki"],
    tags_en: ["Aggressive", "Viking", "2 Castles"],
    desc_pl: "Olaf to AI o przeciętnym poziomie trudności, jednak nie należy go lekceważyć.Posiada dwa zamki, mocno inspirowane tymi, które budował w Twierdzy 2.Ze względu na to, że w tej grze nie ma berserkerów ani miotaczy toporów, musiałem zastąpić ich innymi jednostkami.",
    desc_en: "Olaf is an AI with an average level of difficulty, but he should not be underestimated. He has two castles, heavily inspired by the ones he built in Stronghold 2. Since there are no berserkers or axe throwers in this game, I had to replace them with other units.",
        castle_imgs: [
        "olaf1.png",
        "olaf2.png"
    ],
    media_pl: "https://github.com/al4n-commits/Boty-Twierdza-2-w-krzy-owcu./raw/refs/heads/main/Olaf%20Grimtooth.rar",
    media_en: "#"
  }
  {
    id: "edwin",
    category: "t2",
    name: "Edwin Blackfly",
    icon: "??",
    avatar: "avatarse.png", 
    tags_pl: ["Słaby", "Tchórz", "3 Zamki"],
    tags_en: ["Weak", "Coward", "3 Castles"],
    desc_pl: "Edwin to dość niezdarny lord, jednak im dłużej pozostaje w grze, tym częściej i liczniej wysyła swoje oddziały. Posiada trzy zamki, mocno inspirowane tymi, które budował w Twierdzy 2.",
    desc_en: "Edwin is a rather clumsy lord, but the longer he stays in the game, the more frequently and numerously he sends out his troops. He has three castles, heavily inspired by the ones he built in Stronghold 2.",
    castle_imgs: [
        "edwin1.png",
        "edwin2.png",
        "edwin3.png"
    ],
    media_pl: "#", 
    media_en: "#"
  }
];

const UI = {
    pl: { sidebar: "Dost\u0119pni Lordowie", empty: "Wybierz lorda z listy", history: "Historia / Taktyka", variants: "Warianty Zamk\u00f3w", download: "Pobierz Media", btn_media: "POBIERZ PACZK\u0118 PL", no_file: "Plik niedost\u0119pny", install: "Instrukcja: Wypakuj do:" },
    en: { sidebar: "Available Lords", empty: "Select a lord", history: "History / Tactics", variants: "Castle Variants", download: "Download Media", btn_media: "DOWNLOAD ENG PACK", no_file: "File not available", install: "Guide: Extract to:" }
};

/* --- LOGIKA --- */
let lang = 'pl'; let currentCat = 'all'; let activeLordId = null;
function setLang(l) { lang = l; refreshUI(); }
function filterCat(cat) { currentCat = cat; refreshUI(); }

function refreshUI() {
    document.getElementById('btn-pl').classList.toggle('active', lang === 'pl');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    const catTabs = document.getElementById('cat-tabs-ui');
    catTabs.innerHTML = CATEGORIES.map(c => `<button class="cat-btn ${currentCat===c.id?'active':''}" onclick="filterCat('${c.id}')">${lang==='pl'?c.pl:c.en}</button>`).join('');
    document.getElementById('sidebar-lbl').innerText = UI[lang].sidebar;
    renderSidebar();
    if(activeLordId) showLord(activeLordId); else renderEmpty();
}

function renderEmpty() {
    document.getElementById('main-panel').innerHTML = `<div class="empty-state"><h2>${UI[lang].empty}</h2></div>`;
}

function renderSidebar() {
    const list = document.getElementById('sidebar-list');
    const filtered = LORDS.filter(l => currentCat === 'all' || l.category === currentCat);
    list.innerHTML = filtered.map(l => {
        const hasImg = l.avatar && l.avatar !== "";
        return `<button class="lord-btn ${activeLordId === l.id ? 'on' : ''}" onclick="showLord('${l.id}')">
            <div class="avatar-box ${hasImg?'has-img':''}">${hasImg ? `<img src="${l.avatar}">` : l.icon}</div>
            <div class="lord-btn-name">${l.name}</div>
        </button>`;
    }).join('');
}

function showLord(id) {
    activeLordId = id; const l = LORDS.find(x => x.id === id); const t = UI[lang];
    const currentLink = lang === 'pl' ? l.media_pl : l.media_en;
    const hasPortrait = l.avatar && l.avatar !== "";
    renderSidebar();
    document.getElementById('main-panel').innerHTML = `
        <div class="card-head"><div class="portrait-large ${hasPortrait?'has-img':''}">${hasPortrait ? `<img src="${l.avatar}">` : l.icon}</div>
        <div class="title-area"><h2>${l.name}</h2><div class="tags-row">${(lang==='pl'?l.tags_pl:l.tags_en).map(tag => `<span class="tag">${tag}</span>`).join('')}</div></div></div>
        <div class="section-label">${t.history}</div><p class="description">${lang==='pl'?l.desc_pl:l.desc_en}</p>
        <div class="section-label">${t.variants} (${l.castle_imgs.length})</div><div class="castle-gallery">${l.castle_imgs.map(img => `<img src="${img}" class="gallery-img">`).join('')}</div>
        <div class="dl-section"><div class="section-label">${t.download}</div>${(currentLink && currentLink !== '#') ? `<a href="${currentLink}" class="btn-dl">${t.btn_media}</a>` : `<span style="color:var(--fire)">${t.no_file}</span>`}
        <div class="install-path"><strong>${t.install}</strong><br><code>AppData\\LocalLow\\Firefly Studios\\Stronghold Crusader Definitive Edition\\CustomMedia</code></div></div>`;
}
setLang('pl');

/* --- FIRE ASH --- */
(function(){
    const canvas = document.getElementById('dust'); const ctx = canvas.getContext('2d'); let w, h, particles = [];
    function init() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
    class Ash { constructor() { this.reset(); } reset() { this.x = Math.random() * w; this.y = h + 20; this.size = Math.random() * 3 + 1; this.vy = -(Math.random() * 2 + 0.8); this.vx = (Math.random() - 0.5) * 2; this.alpha = Math.random() * 0.7 + 0.3; this.color = Math.random() > 0.5 ? '#ff4500' : '#ff8c00'; } update() { this.y += this.vy; this.x += this.vx; this.alpha -= 0.002; if (this.alpha <= 0 || this.y < -20) this.reset(); } draw() { ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color; ctx.fillRect(this.x, this.y, this.size, this.size); } }
    for(let i=0; i<80; i++) particles.push(new Ash());
    function loop() { ctx.clearRect(0,0,w,h); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(loop); }
    window.addEventListener('resize', init); init(); loop();
})();
</script>
</body>
</html>
